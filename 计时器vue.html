<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>可配置倒计时器</title>
    <script src="https://cdn.jsdelivr.net/npm/vue"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #333;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            color: #5a67d8;
            margin-bottom: 25px;
            font-size: 2.2em;
        }

        .control-panel {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 25px;
            border: 2px solid #e2e8f0;
        }

        .control-group {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 15px;
            /*margin: 10px 0;*/
            flex-wrap: wrap;
        }

        .control-group label {
            font-weight: 600;
            color: #4a5568;
        }

        .control-group input {
            width: 80px;
            padding: 8px 12px;
            border: 2px solid #cbd5e0;
            border-radius: 8px;
            font-size: 16px;
            text-align: center;
            transition: border-color 0.3s ease;
        }

        .control-group input:focus {
            outline: none;
            border-color: #5a67d8;
        }

        .btn {
            background: #5a67d8;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 0 5px;
        }

        .btn:hover {
            background: #4c51bf;
            transform: translateY(-2px);
        }

        .btn:active {
            transform: translateY(0);
        }

        .time-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px;
            padding: 25px;
            margin: 20px 0;
        }

        .current-time {
            font-size: 1.4em;
            margin-bottom: 10px;
            opacity: 0.9;
        }

        .next-time {
            font-size: 1.2em;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .countdown {
            font-size: 4em;
            font-weight: bold;
            margin: 20px 0;
            text-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
        }

        .status {
            margin-top: 15px;
            font-size: 1.1em;
            font-weight: 600;
        }

        .time-list {
            background: #f7fafc;
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            border: 2px solid #e2e8f0;
        }

        .time-list h3 {
            color: #5a67d8;
            margin-bottom: 15px;
            font-size: 1.3em;
        }

        .time-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
            gap: 8px;
        }

        .time-item {
            background: white;
            color: #4a5568;
            padding: 8px 12px;
            border-radius: 8px;
            text-align: center;
            font-size: 0.95em;
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
        }

        .time-item.next {
            background: #5a67d8;
            color: white;
            font-weight: bold;
            transform: scale(1.05);
            border-color: #5a67d8;
            box-shadow: 0 4px 12px rgba(90, 103, 216, 0.4);
        }

        .time-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .container {
                padding: 20px 15px;
            }

            h1 {
                font-size: 1.8em;
            }

            .countdown {
                font-size: 3em;
            }

            .control-group {
                /*flex-direction: column;*/
                gap: 10px;
            }

            .time-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        .mg10 {
            margin: 10px 0;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <h1>可配置倒计时器</h1>
    <div class="control-panel">
        <div class="control-group mg10">
            <div class="control-group">
                <label>开始分钟:</label>
                <input type="number" id="startMinutes" min="0" max="59" v-model="startMinutes" placeholder="分钟">
            </div>
            <div class="control-group">
                <label>开始秒:</label>
                <input type="number" id="startSeconds" min="0" max="59" v-model="startSeconds" placeholder="秒">
            </div>
        </div>
        <div class="control-group mg10">
            <label>倒计时间隔:</label>
            <input type="number" id="intervalMinutes" min="1" max="60" v-model="intervalMinutes" placeholder="分钟">
            <span>分钟</span>
        </div>
        <div class="control-group">
            <button class="btn" @click="startTimer()">开始计时</button>
            <button class="btn" @click="resetTimer()">重置</button>
        </div>
    </div>

    <div class="time-display">
        <div class="current-time">
            当前时间: <span id="currentTime">{{currentTime}}</span>
        </div>
        <div class="next-time">
            下一个时间节点: <span id="nextTime">{{nextTimeContent}}</span>
        </div>
        <div class="countdown" id="countdown">{{countdown}}</div>
        <div class="status" id="status">等待开始</div>
    </div>

    <div class="time-list">
        <h3>未来时间节点</h3>
        <div class="time-grid" id="timeGrid">
            <div class="time-item" :class="item==nextTimeContent?'next':''" v-for="(item,index) in timeGrid"
                 :key="index">{{item}}
            </div>
        </div>
    </div>
</div>
<script>
    const {createApp, ref} = Vue;
    let updateCurrentTimeInterval = null;
    let timerInterval = null;
    let startTime = null;
    let currentTime = ref(null);//当前时间
    let startMinutes = ref(0);//开始分钟
    let startSeconds = ref(0);//开始秒
    let intervalMinutes = ref(0);//倒计时间隔
    let nextTimeContent = ref('');//下一个时间节点
    let timeGrid = ref([])//未来时间节点
    let countdown = ref('--:--')//倒计时


    createApp({
        setup() {
            function getCurrentTime() {
                return new Date(); // 直接使用本地时间，不转换时区
            }

            // 更新当前时间
            function updateCurrentTime() {
                const now = getCurrentTime();
                const currentTimeStr = now.toLocaleTimeString('zh-CN', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                currentTime.value = currentTimeStr;
            }

            function startTimer() {
                if (startMinutes.value < 0 || startMinutes.value > 59 || startSeconds.value < 0 || startSeconds.value > 59) {
                    alert('请输入有效的时间值！分钟：0-59，秒：0-59');
                    return;
                }

                if (intervalMinutes.value < 1 || intervalMinutes.value > 60) {
                    alert('请输入有效的倒计时间隔！1-60分钟');
                    return;
                }

                // 设置开始时间（基于当前小时的指定分钟和秒）
                const now = getCurrentTime();
                startTime = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours(), startMinutes.value, startSeconds.value);

                // 如果设置的时间已经过去，设置为下一个小时的相同时间
                if (startTime <= now) {
                    startTime.setHours(startTime.getHours() + 1);
                }

                // 清除之前的计时器
                if (timerInterval) {
                    clearInterval(timerInterval);
                }
                if (updateCurrentTimeInterval) {
                    clearInterval(updateCurrentTimeInterval);
                }

                // 立即更新一次
                updateTimer();
                updateCurrentTime()

                // 开始计时
                timerInterval = setInterval(updateTimer, 1000);
                updateCurrentTimeInterval = setInterval(updateCurrentTime, 1000);


                document.getElementById('status').textContent = '计时中...';
                document.getElementById('status').style.color = '#48bb78';
            }

            //
            function resetTimer() {
                if (timerInterval) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                }

                startTime = null;
                countdown.value = '--:--';
                nextTimeContent.value = '--:--:--';
                document.getElementById('status').textContent = '等待开始';
                document.getElementById('status').style.color = '#718096';
                timeGrid.value = []
            }


            function updateTimer() {
                if (!startTime) return;

                const now = getCurrentTime();
                const intervalSeconds = intervalMinutes.value * 60;

                // 计算从开始时间到现在经过了多少个完整的间隔
                const elapsedSeconds = Math.floor((now - startTime) / 1000);
                const currentInterval = Math.floor(elapsedSeconds / intervalSeconds);

                // 计算下一个时间节点
                const nextIntervalSeconds = (currentInterval + 1) * intervalSeconds;
                const nextTime = new Date(startTime.getTime() + nextIntervalSeconds * 1000);

                // 计算剩余时间
                const remainingSeconds = Math.floor((nextTime - now) / 1000) + 1;

                if (remainingSeconds <= 0) {
                    // 如果时间已过，重新计算
                    updateTimer();
                    return;
                }

                // 更新倒计时显示
                const mins = Math.floor(remainingSeconds / 60);
                const secs = remainingSeconds % 60;
                countdown.value =
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;

                // 更新下一个时间节点
                const nextTimeStr = nextTime.toLocaleTimeString('zh-CN', {
                    hour12: false,
                    hour: '2-digit',
                    minute: '2-digit',
                    second: '2-digit'
                });
                nextTimeContent.value = nextTimeStr;

                // 更新状态
                if (remainingSeconds <= 10) {
                    document.getElementById('status').textContent = '⚠️ 即将到达时间节点！';
                    document.getElementById('status').style.color = '#f56565';
                } else {
                    document.getElementById('status').textContent = '计时中...';
                    document.getElementById('status').style.color = '#48bb78';
                }

                // 生成未来时间节点列表
                generateTimeList(nextTime);
            }

            // 获取一小时内符合的时间节点
            function getTimePointsInHour(nextTime) {
                const now = new Date(nextTime);
                const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), now.getHours()); // 获取当前小时的起始时间
                const startTime = new Date(today);
                startTime.setMinutes(startMinutes.value);
                startTime.setSeconds(startSeconds.value);

                // 计算当前时间与开始时间的差值（以分钟为单位）
                let elapsedMinutes = Math.floor((now.getTime() - startTime.getTime()) / (1000 * 60));

                // 计算从开始时间起，到当前时间的完整间隔数
                let fullIntervalsPassed = Math.floor(elapsedMinutes / intervalMinutes.value);

                // 计算下一个时间点
                let nextTimePoint = new Date(today);
                nextTimePoint.setMinutes(startMinutes.value + (fullIntervalsPassed + 1) * intervalMinutes.value);
                nextTimePoint.setSeconds(startSeconds.value); // 重置秒为开始秒数

                // 创建一个数组来存储所有的时间点
                let timePoints = [];
                if (!intervalMinutes.value) return timePoints
                for (let i = 0; i < 60 / intervalMinutes.value; i++) { // 每小时最多有60分钟，所以这里是60/intervalMinutes
                    let time = new Date(today);
                    time.setMinutes(startMinutes.value + i * intervalMinutes.value);
                    time.setSeconds(startSeconds.value);
                    timePoints.push(time);
                }

                return timePoints;
            }

            // 生成未来时间节点列表
            function generateTimeList(nextTime) {
                timeGrid.value = []

                // 使用示例
                const timePoints = getTimePointsInHour(nextTime); // 从2分12秒开始，每6分钟一个时间点
                timePoints.forEach((time) => {
                    const timeStr = time.toLocaleTimeString('zh-CN', {
                        hour12: false,
                        hour: '2-digit',
                        minute: '2-digit',
                        second: '2-digit'
                    });
                    timeGrid.value.push(timeStr)
                })
            }

            // 每秒更新当前时间
            updateCurrentTimeInterval = setInterval(updateCurrentTime, 1000);
            updateCurrentTime();

            // 页面加载时显示默认的时间节点预览
            function previewTimeList() {
                const now = getCurrentTime();
                generateTimeList(now);
            }


            // 初始化预览
            previewTimeList();
            return {
                startMinutes,
                startSeconds,
                intervalMinutes,
                currentTime,
                timeGrid,
                countdown,
                nextTimeContent,
                startTimer,
                resetTimer,
            };
        }
    }).mount('#app');
</script>
</body>
</html>
